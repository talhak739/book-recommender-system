<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Book Recommender System{% endblock %}</title>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-primary: #f3f8fc;
            --bg-gradient: linear-gradient(135deg, #f0f7fc 0%, #e6f1fa 100%);
            --primary: #3b9df8;
            --primary-hover: #1e87e5;
            --primary-light: #e6f3ff;
            --primary-glow: rgba(59, 157, 248, 0.2);
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.6);
            --shadow: 0 10px 30px rgba(148, 187, 225, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid rgba(59, 157, 248, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-brand i {
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--primary) 0%, #1e87e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            transition: var(--transition);
        }

        .nav-links a:hover,
        .nav-links li.active a {
            color: var(--primary);
            background: var(--primary-light);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            width: 90%;
            margin: 2rem auto;
            flex-grow: 1;
        }

        /* Hero / Search Section */
        .search-hero {
            text-align: center;
            margin: 2.5rem auto 3.5rem auto;
            max-width: 650px;
        }

        .search-hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .search-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        /* Search Form & Autocomplete */
        .search-form-container {
            position: relative;
            width: 100%;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 2px solid rgba(59, 157, 248, 0.15);
            border-radius: 20px;
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .search-input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 10px 30px var(--primary-glow);
            transform: translateY(-2px);
        }

        .search-input-wrapper i.search-icon {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-right: 0.8rem;
        }

        .search-input {
            flex-grow: 1;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            font-family: inherit;
            color: var(--text-dark);
            outline: none;
            padding: 0.6rem 0;
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .search-submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-submit-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(30, 135, 229, 0.3);
        }

        /* Autocomplete suggestions dropdown */
        .autocomplete-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 157, 248, 0.15);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            padding: 0.5rem 0;
        }

        .autocomplete-suggestion {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            font-size: 0.95rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.02);
        }

        .autocomplete-suggestion:last-child {
            border-bottom: none;
        }

        .autocomplete-suggestion i {
            color: var(--primary);
            font-size: 0.85rem;
        }

        .autocomplete-suggestion:hover,
        .autocomplete-suggestion.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: auto;
            border-top: 1px solid rgba(59, 157, 248, 0.08);
            background: rgba(255, 255, 255, 0.4);
        }

        /* Glass Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        /* Custom Scrollbar for suggestions */
        .autocomplete-dropdown::-webkit-scrollbar {
            width: 8px;
        }

        .autocomplete-dropdown::-webkit-scrollbar-track {
            background: transparent;
        }

        .autocomplete-dropdown::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .autocomplete-dropdown::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Grid layouts */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }

        /* Book Card styling */
        .book-card {
            display: flex;
            flex-direction: column;
            padding: 1.2rem;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(148, 187, 225, 0.25);
            border-color: rgba(59, 157, 248, 0.25);
        }

        .book-img-container {
            width: 100%;
            aspect-ratio: 2 / 3;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .book-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .book-card:hover .book-img {
            transform: scale(1.05);
        }

        .book-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .book-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.4rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.7rem;
        }

        .book-author {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-meta {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 500;
            border-top: 1px solid rgba(59, 157, 248, 0.08);
            padding-top: 0.75rem;
        }

        .book-votes {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .book-rating {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Section Heading */
        .section-header {
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .section-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .section-header::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 40px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem;
            }

            .nav-links {
                gap: 0.8rem;
            }

            .nav-links a {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }

            .search-hero h1 {
                font-size: 2rem;
            }

            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }

            .book-card {
                padding: 0.8rem;
            }

            .book-title {
                font-size: 0.95rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <i class="fa-solid fa-book-open-reader"></i>
            <span>LuminaBook</span>
        </a>
        <ul class="nav-links">
            <li class="{% block active_home %}{% endblock %}"><a href="/"><i class="fa-solid fa-house"></i> Home</a>
            </li>
            <li class="{% block active_recommend %}{% endblock %}"><a href="/recommend"><i
                        class="fa-solid fa-wand-magic-sparkles"></i> Recommend</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const searchInput = document.getElementById('bookSearchInput');
            const dropdown = document.getElementById('autocompleteDropdown');
            const form = document.getElementById('searchForm');

            if (!searchInput || !dropdown || !form) return;

            let activeIndex = -1;
            let currentSuggestions = [];
            let debounceTimer;

            searchInput.addEventListener('input', function () {
                clearTimeout(debounceTimer);
                const query = this.value.trim();

                if (query.length < 2) {
                    hideDropdown();
                    return;
                }

                // Debounce API call
                debounceTimer = setTimeout(() => {
                    fetch(`/suggest?q=${encodeURIComponent(query)}`)
                        .then(response => response.json())
                        .then(data => {
                            currentSuggestions = data;
                            renderSuggestions(data);
                        })
                        .catch(err => console.error('Error fetching suggestions:', err));
                }, 150);
            });

            // Handle keys (ArrowDown, ArrowUp, Enter, Escape)
            searchInput.addEventListener('keydown', function (e) {
                const items = dropdown.getElementsByClassName('autocomplete-suggestion');

                if (dropdown.style.display !== 'block') return;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    activeIndex = (activeIndex + 1) % items.length;
                    highlightItem(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    activeIndex = (activeIndex - 1 + items.length) % items.length;
                    highlightItem(items);
                } else if (e.key === 'Enter') {
                    if (activeIndex > -1 && items[activeIndex]) {
                        e.preventDefault();
                        selectSuggestion(items[activeIndex].textContent.trim());
                    }
                } else if (e.key === 'Escape') {
                    hideDropdown();
                }
            });

            function renderSuggestions(suggestions) {
                dropdown.innerHTML = '';
                activeIndex = -1;

                if (suggestions.length === 0) {
                    hideDropdown();
                    return;
                }

                suggestions.forEach(suggestion => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-suggestion';
                    div.innerHTML = `<i class="fa-solid fa-search"></i> ${suggestion}`;
                    div.addEventListener('click', function () {
                        selectSuggestion(suggestion);
                    });
                    dropdown.appendChild(div);
                });

                dropdown.style.display = 'block';
            }

            function highlightItem(items) {
                // Clear active classes
                Array.from(items).forEach(item => item.classList.remove('active'));

                if (activeIndex > -1 && items[activeIndex]) {
                    items[activeIndex].classList.add('active');
                    // Ensure the active item is visible in scroll
                    items[activeIndex].scrollIntoView({ block: 'nearest' });
                }
            }

            function selectSuggestion(value) {
                searchInput.value = value;
                hideDropdown();
                form.submit();
            }

            function hideDropdown() {
                dropdown.style.display = 'none';
                activeIndex = -1;
            }

            // Hide dropdown when clicking outside
            document.addEventListener('click', function (e) {
                if (e.target !== searchInput && e.target !== dropdown) {
                    hideDropdown();
                }
            });
        });
    </script>
</body>

</html>
